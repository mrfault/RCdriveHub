<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RC DriveHub — Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="css/styles.css" />
<script>
// Load fonts non-blocking, render page only after fonts ready (prevents FOUT)
(function(){
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Saira:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500;700&display=block';
  document.head.appendChild(link);
  // Hide body until fonts loaded
  document.documentElement.style.visibility = 'hidden';
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function(){ document.documentElement.style.visibility = 'visible'; });
  }
  // Fallback: show after 1.5s max
  setTimeout(function(){ document.documentElement.style.visibility = 'visible'; }, 1500);
})();
</script>
<style>
  html, body { background: var(--bg-page); background-color: #0E1014; }
  #app { min-height: 100vh; }
  @keyframes rc-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes rc-rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
  @keyframes rc-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .rc-reveal { animation: rc-rise var(--dur-hero) var(--ease-power) both; }
  .rc-float { animation: rc-float 4.5s var(--ease-in-out) infinite; }
  @keyframes rc-toast-in { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: none; } }
  .rc-toast { animation: rc-toast-in var(--dur-base) var(--ease-overshoot) both; }

  /* Music equalizer bars animation */
  @keyframes rc-eq1 { 0%,100% { height: 4px; } 50% { height: 16px; } }
  @keyframes rc-eq2 { 0%,100% { height: 12px; } 50% { height: 4px; } }
  @keyframes rc-eq3 { 0%,100% { height: 8px; } 50% { height: 18px; } }
  .rc-eq-bar { width: 3px; border-radius: 2px; background: var(--flame-500); display: inline-block; vertical-align: bottom; }
  .rc-eq-playing .rc-eq-bar:nth-child(1) { animation: rc-eq1 0.8s ease-in-out infinite; }
  .rc-eq-playing .rc-eq-bar:nth-child(2) { animation: rc-eq2 0.6s ease-in-out infinite 0.1s; }
  .rc-eq-playing .rc-eq-bar:nth-child(3) { animation: rc-eq3 0.7s ease-in-out infinite 0.2s; }
  .rc-eq-paused .rc-eq-bar { height: 4px !important; animation: none !important; }

  /* Gauge needle animation */
  @keyframes rc-spin-gauge { 0% { transform: rotate(-30deg); } 50% { transform: rotate(30deg); } 100% { transform: rotate(-30deg); } }

  /* RC Builder nav bounce */
  @keyframes rc-bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .rc-nav-builder { animation: rc-bounce 2s var(--ease-in-out) infinite; }
  @media (max-width: 980px) { .rc-hide-md { display: none !important; } .rc-show-md { display: flex !important; } .rc-catalog-wrap { grid-template-columns: 1fr !important; } }
  @media (min-width: 981px) { .rc-show-md { display: none !important; } }
  @media (max-width: 680px) { .rc-hide-sm { display: none !important; } }
  @media (prefers-reduced-motion: reduce) { .rc-reveal, .rc-float { animation: none !important; } }

  /* Mobile menu overlay */
  .rc-mobile-menu {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,9,12,0.85); backdrop-filter: blur(16px);
    display: flex; flex-direction: column;
    padding: 80px 24px 40px;
    animation: rc-rise 300ms var(--ease-power) both;
  }
  .rc-mobile-menu a, .rc-mobile-menu button {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 0; border: none; background: none;
    font-family: var(--font-display); font-style: italic; font-weight: 900;
    font-size: 1.6rem; text-transform: uppercase; color: var(--text-strong);
    border-bottom: 1px solid var(--border-subtle); width: 100%; text-align: left;
  }
  .rc-mobile-menu button:active { color: var(--flame-500); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="js/data.js"></script>
<script type="text/babel" src="js/components.jsx"></script>
<script type="text/babel" src="js/chrome.jsx"></script>
<script type="text/babel" src="js/HomeView.jsx"></script>
<script type="text/babel" src="js/CatalogView.jsx"></script>
<script type="text/babel" src="js/ProductView.jsx"></script>
<script type="text/babel" src="js/PartFinderView.jsx"></script>
<script type="text/babel" src="js/CartView.jsx"></script>
<script type="text/babel" src="js/SaleView.jsx"></script>
<script type="text/babel" src="js/FavoritesView.jsx"></script>
<script type="text/babel" src="js/TuningView.jsx"></script>
<script type="text/babel" src="js/BuilderView.jsx"></script>
<script type="text/babel" src="js/AccountView.jsx"></script>

<script type="text/babel">
  class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(error) { return { error }; }
    render() {
      if (this.state.error) return (
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-muted)' }}>
          <h2 style={{ color: 'var(--flame-500)' }}>Xəta baş verdi</h2>
          <p>{this.state.error.message}</p>
          <button onClick={() => { this.setState({ error: null }); window.location.reload(); }}
            style={{ padding: '10px 24px', background: 'var(--grad-flame)', color: '#fff', border: 'none', borderRadius: 6, marginTop: 16, cursor: 'pointer' }}>Yenidən yüklə</button>
        </div>
      );
      return this.props.children;
    }
  }

  const NAV = [
    { id: 'catalog', label: 'Modellər' },
    { id: 'finder', label: 'Ehtiyat hissələri' },
    { id: 'tuning', label: 'Tuning' },
    { id: 'builder', label: 'RC BUILDER', lang: 'en' },
    { id: 'sale', label: 'Endirimlər' },
  ];

  function SplashScreen({ onEnter }) {
    return (
      <div onClick={onEnter} style={{ position: 'fixed', inset: 0, zIndex: 999, background: 'var(--carbon-950)', display: 'flex', flexDirection: 'column', cursor: 'pointer', animation: 'rc-rise 500ms var(--ease-power) both' }}>
        <div style={{ padding: '24px 0 0' }} className="rc-container"><Logo size={28} /></div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <h2 style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 900, textTransform: 'uppercase', fontSize: 'clamp(2.5rem,6vw,4.5rem)', lineHeight: 0.9, color: 'var(--text-strong)', textAlign: 'center' }}>
            Böyüklərin <span style={{ color: 'var(--flame-500)' }}>kiçik arzuları</span>
          </h2>
          <div style={{ marginTop: 40 }}>
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
              {/* Outer ring pulse */}
              <circle cx="50" cy="50" r="48" stroke="var(--flame-500)" strokeWidth="1" opacity="0.15">
                <animate attributeName="r" values="44;48;44" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.25;0.08;0.25" dur="2s" repeatCount="indefinite" />
              </circle>
              {/* Arc track */}
              <path d="M 15 65 A 40 40 0 1 1 85 65" stroke="var(--carbon-700)" strokeWidth="6" strokeLinecap="round" fill="none" />
              {/* Arc fill — animated */}
              <path d="M 15 65 A 40 40 0 1 1 85 65" stroke="url(#splashGaugeGrad)" strokeWidth="6" strokeLinecap="round" fill="none" strokeDasharray="200" strokeDashoffset="200">
                <animate attributeName="stroke-dashoffset" values="200;40;200" dur="2.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" />
              </path>
              {/* Needle */}
              <line x1="50" y1="50" x2="50" y2="22" stroke="var(--flame-500)" strokeWidth="3" strokeLinecap="round">
                <animateTransform attributeName="transform" type="rotate" values="-50 50 50;60 50 50;-50 50 50" dur="2.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" />
              </line>
              {/* Center hub */}
              <circle cx="50" cy="50" r="6" fill="var(--carbon-800)" stroke="var(--flame-500)" strokeWidth="2" />
              <circle cx="50" cy="50" r="2.5" fill="var(--flame-500)">
                <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite" />
              </circle>
              {/* Tick marks */}
              {[0,1,2,3,4,5,6,7,8].map(i => {
                const angle = -130 + i * 32.5;
                const rad = angle * Math.PI / 180;
                const x1 = 50 + 36 * Math.cos(rad), y1 = 50 + 36 * Math.sin(rad);
                const x2 = 50 + 40 * Math.cos(rad), y2 = 50 + 40 * Math.sin(rad);
                return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={i > 6 ? 'var(--flame-500)' : 'var(--carbon-500)'} strokeWidth={i % 2 === 0 ? 2 : 1} strokeLinecap="round" />;
              })}
              {/* Speed text */}
              <text x="50" y="72" textAnchor="middle" fill="var(--text-faint)" fontSize="9" fontFamily="var(--font-mono)" fontWeight="700">KM/S</text>
              <defs><linearGradient id="splashGaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="var(--flame-300)" /><stop offset="100%" stopColor="#FF4D14" /></linearGradient></defs>
            </svg>
          </div>
          <p style={{ color: 'var(--text-faint)', fontSize: 13, marginTop: 24, fontFamily: 'var(--font-mono)', letterSpacing: '0.04em' }}>Davam etmək üçün klik edin</p>
        </div>
      </div>
    );
  }

  function CookieBanner() {
    const [visible, setVisible] = React.useState(() => !localStorage.getItem('rc_cookies'));
    if (!visible) return null;
    const accept = () => {
      localStorage.setItem('rc_cookies', 'accepted');
      setVisible(false);
      // Start music immediately on this click (user gesture)
      if (window._toggleMusic) window._toggleMusic();
    };
    const deny = () => { localStorage.setItem('rc_cookies', 'denied'); setVisible(false); };
    return (
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 250, background: 'var(--carbon-950)', borderTop: '1px solid var(--border-subtle)', backdropFilter: 'blur(12px)', animation: 'rc-rise 400ms var(--ease-power) both' }}>
        <div className="rc-container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20, padding: '16px 0', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1, minWidth: 260 }}>
            <Icon name="shield" size={20} color="var(--flame-400)" style={{ flex: 'none' }} />
            <p style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5 }}>
              Bu sayt təcrübənizi yaxşılaşdırmaq üçün cookies istifadə edir. Davam etməklə <a href="#" style={{ color: 'var(--flame-400)', textDecoration: 'underline' }}>məxfilik siyasətimizi</a> qəbul edirsiniz.
            </p>
          </div>
          <div style={{ display: 'flex', gap: 10, flex: 'none' }}>
            <Button variant="ghost" size="sm" onClick={deny}>Rədd et</Button>
            <Button variant="primary" size="sm" onClick={accept}>Qəbul et</Button>
          </div>
        </div>
      </div>
    );
  }

  function Toast({ item }) {
    if (!item) return null;
    return (
      <div className="rc-toast" style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 100, display: 'flex', alignItems: 'center', gap: 12, padding: '14px 18px', background: 'var(--surface-raised)', border: '1px solid var(--border-flame)', borderRadius: 'var(--radius-md)', boxShadow: 'var(--glow-flame)', maxWidth: 340 }}>
        <span style={{ width: 34, height: 34, borderRadius: 999, background: 'var(--flame-soft)', display: 'grid', placeItems: 'center', flex: 'none' }}><Icon name="check" size={18} color="var(--flame-400)" strokeWidth={2.5} /></span>
        <div>
          <div style={{ fontWeight: 700, color: 'var(--text-strong)', fontSize: 13.5 }}>Səbətə əlavə olundu</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', maxWidth: 240, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.title}</div>
        </div>
      </div>
    );
  }

  function App() {
    const data = window.RCDATA;
    const [view, setView] = React.useState('home');
    const [product, setProduct] = React.useState(data.products[0]);
    const [cart, setCart] = React.useState(2);
    const [toast, setToast] = React.useState(null);
    const [lightbox, setLightbox] = React.useState(null);
    const [musicPlaying, setMusicPlaying] = React.useState(false);
    const [showSplash, setShowSplash] = React.useState(() => window.innerWidth > 768 && localStorage.getItem('rc_cookies') === 'accepted');
    const audioRef = React.useRef(null);
    const tRef = React.useRef();

    // Init audio once
    React.useEffect(() => {
      // Music only on desktop
      if (window.innerWidth <= 768) return;
      const a = new Audio('assets/nfs.mp3');
      a.loop = true;
      a.volume = 0.3;
      a.preload = 'auto';
      audioRef.current = a;
      return () => { a.pause(); };
    }, []);

    const toggleMusic = () => {
      const a = audioRef.current;
      if (!a) return;
      if (musicPlaying) { a.pause(); setMusicPlaying(false); }
      else { a.play().then(() => setMusicPlaying(true)).catch(() => {}); }
    };
    window._musicPlaying = musicPlaying;
    window._toggleMusic = toggleMusic;

    const openLightbox = (images, index) => setLightbox({ images, index: index || 0 });
    const closeLightbox = () => setLightbox(null);
    window._openLightbox = openLightbox;

    const addToCart = (item, qty = 1) => {
      setCart(c => c + qty);
      setToast(item);
      clearTimeout(tRef.current);
      tRef.current = setTimeout(() => setToast(null), 2600);
    };
    const go = (v) => { setView(v); window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' }); };
    const openProduct = (p) => { setProduct(p); go('product'); };

    const enterSite = () => {
      setShowSplash(false);
      const a = audioRef.current;
      if (a) a.play().then(() => setMusicPlaying(true)).catch(() => {});
    };

    return (
      <div>
        {showSplash && <SplashScreen onEnter={enterSite} />}
        <Header nav={NAV} current={view} onNav={go} cartCount={cart} onSearch={() => go('catalog')} />
        <main>
          {view === 'home' && <HomeView data={data} onNav={go} onAdd={addToCart} />}
          {view === 'finder' && <PartFinderView data={data} onAdd={addToCart} />}
          {view === 'tuning' && <TuningView data={data} onAdd={addToCart} />}
          {view === 'builder' && <BuilderView onAdd={addToCart} />}
          {['catalog','product','cart','favorites','account','sale'].includes(view) && (
            <div className="rc-light" style={{ background: 'var(--bg-page)', minHeight: '72vh', paddingBottom: 56 }}>
              {view === 'catalog' && <CatalogView data={data} onOpen={openProduct} onAdd={addToCart} />}
              {view === 'sale' && <SaleView data={data} onOpen={openProduct} onAdd={addToCart} />}
              {view === 'product' && <ProductView product={product} related={[...data.products, ...data.parts]} onAdd={addToCart} onBack={() => go('catalog')} />}
              {view === 'cart' && <CartView data={data} onNav={go} />}
              {view === 'favorites' && <FavoritesView data={data} onOpen={openProduct} onAdd={addToCart} onNav={go} />}
              {view === 'account' && <AccountView onNav={go} />}
            </div>
          )}
        </main>
        <Footer />
        <Toast item={toast} />
        <CookieBanner />
        {lightbox && <Lightbox images={lightbox.images} index={lightbox.index} onClose={closeLightbox} onChange={(i) => setLightbox(lb => ({ ...lb, index: i }))} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
