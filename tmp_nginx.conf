server {
    listen 443 ssl;
    server_name rchub.023.az;

    ssl_certificate /etc/ssl/023.az/cert.pem;
    ssl_certificate_key /etc/ssl/023.az/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 64M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Frontend root (admin symlinked here)
    root /var/www/023.az-subs/rchub;
    index index.html;

    # API — all /api/* requests go to Laravel
    location /api {
        rewrite ^/api/(.*)$ /index.php?/$1 last;
    }

    location ~ \.php$ {
        root /var/www/rchub-api/public;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/rchub-api/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Storage (uploaded files)
    location /storage {
        alias /var/www/rchub-api/storage/app/public;
        expires 30d;
    }

    # Admin panel (symlink: /var/www/023.az-subs/rchub/admin -> /var/www/rchub-admin/dist)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Frontend static files
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(mp3|mp4|jpg|jpeg|png|webp|gif|svg|css|js|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control 'public, immutable';
        try_files $uri =404;
    }
}
